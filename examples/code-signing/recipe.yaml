schema_version: 1

context:
  version: "0.1.0"

package:
  name: hello-signed
  version: ${{ version }}

source:
  path: ./hello

build:
  script:
    - if: win
      then:
        - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release %CMAKE_ARGS%
    - if: unix
      then:
        - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${CMAKE_ARGS}
    - cmake --build build --config Release
    - cmake --install build

  # Note: no signing config here! Signing is injected externally via
  # --signing-config-file so this recipe stays portable and CI-agnostic.

requirements:
  build:
    - ${{ compiler('c') }}
    - ninja
    - cmake

tests:
  - script:
      - if: unix
        then:
          - hello
      - if: osx
        then:
          - codesign --verify --deep --strict $PREFIX/bin/hello
          - codesign --verify --deep --strict $PREFIX/lib/libgreet.dylib
      - if: win
        then:
          - hello
