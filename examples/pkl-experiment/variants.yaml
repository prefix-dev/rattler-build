# Variant configuration for PKL recipe example
# This demonstrates the variant matrix that rattler-build will expand

cuda:
  - "11.8"
  - "12.0"

python:
  - "3.10"
  - "3.11"
  - "3.12"

# Compiler variants
c_compiler:
  - gcc
c_compiler_version:
  - "13"
cxx_compiler:
  - gxx
cxx_compiler_version:
  - "13"

# Only expand cuda x python (not all combinations)
zip_keys:
  - [c_compiler_version, cxx_compiler_version]
