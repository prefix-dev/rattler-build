context:
  version: "1.0.0"

recipe:
  name: repro
  version: ${{ version }}

build:
  number: 0

outputs:
  - package:
      name: repro-wrapper
    build:
      noarch: python
      script: echo "wrapper built"
    requirements:
      host:
        - python >=3.10
        - pip
      run:
        - python >=3.10
        - repro-runtime ==${{ version }}
    tests:
      - python:
          pip_check: true
          imports:
            - sys

  - package:
      name: repro-runtime
    build:
      script: echo "runtime built"
    requirements:
      host:
        - python >=3.10
      run:
        - python >=3.10
    tests:
      - python:
          imports:
            - sys
