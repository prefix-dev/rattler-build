# Test case: Overlinking check with staging outputs
#
# When a package inherits from a staging cache, two classes of dependencies
# are not installed in the child's prefix during the overlinking check:
#
# 1. The staging cache's host dependencies (like `zlib`) — resolved via the
#    staging library name map.
# 2. The staging cache's build dependencies that provide system libraries
#    (like `sysroot_linux-64`, which provides `libc.so.6`, `libpthread.so.0`)
#    — resolved via the sysroot library names captured from the staging
#    cache's build prefix.
#
# This test intentionally does NOT use `missing_dso_allowlist` so both paths
# are exercised end-to-end.

schema_version: 1

recipe:
  name: staging-overlinking-test
  version: "1.0.0"

build:
  number: 0
  dynamic_linking:
    overlinking_behavior: error

outputs:
  - staging:
      name: compile-stage
    requirements:
      build:
        - ${{ compiler('c') }}
      host:
        - zlib
    build:
      script:
        - if: unix
          then: |
            cat > test_zlib.c << 'EOF'
            #include <zlib.h>
            #include <stdio.h>
            int main() {
                printf("zlib version: %s\n", zlibVersion());
                return 0;
            }
            EOF
            mkdir -p $PREFIX/bin
            $CC $CFLAGS $LDFLAGS test_zlib.c -lz -o $PREFIX/bin/test_zlib
        - if: win
          then: |
            echo int main() { return 0; } > test_zlib.c
            mkdir %PREFIX%\bin
            cl test_zlib.c /Fe%PREFIX%\bin\test_zlib.exe

  - package:
      name: staging-overlinking-test
    inherit: compile-stage
    build:
      files:
        - bin/**
