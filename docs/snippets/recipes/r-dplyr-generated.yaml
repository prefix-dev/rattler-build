context:
  build_number: "0"

package:
  name: r-dplyr
  version: 1.2.1

source:
  - url:
      - https://cran.r-project.org/src/contrib/dplyr_1.2.1.tar.gz
      - https://cran.r-project.org/src/contrib/Archive/dplyr_1.2.1.tar.gz
    sha256: 18d66fe2f24cda8b619c177326d39dd015229ab99695fa67d3fa31e4569390e0

build:
  number: ${{ build_number }}
  script: R CMD INSTALL --build . ${R_ARGS}
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - cross-r-base ${{ r_base }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - make
  host:
    - r-base >=4.1.0
    - r-cli >=3.6.2
    - r-generics
    - r-glue >=1.3.2
    - r-lifecycle >=1.0.5
    - r-magrittr >=1.5
    - r-pillar >=1.9.0
    - r-r6
    - r-rlang >=1.1.7
    - r-tibble >=3.2.0
    - r-tidyselect >=1.2.0
    - r-vctrs >=0.7.1
  run:
    - r-base >=4.1.0
    - r-cli >=3.6.2
    - r-generics
    - r-glue >=1.3.2
    - r-lifecycle >=1.0.5
    - r-magrittr >=1.5
    - r-pillar >=1.9.0
    - r-r6
    - r-rlang >=1.1.7
    - r-tibble >=3.2.0
    - r-tidyselect >=1.2.0
    - r-vctrs >=0.7.1
  # -  r-broom  # suggested
  # -  r-covr  # suggested
  # -  r-dbi  # suggested
  # -  r-dbplyr >=2.2.1  # suggested
  # -  r-ggplot2  # suggested
  # -  r-knitr  # suggested
  # -  r-lahman  # suggested
  # -  r-lobstr  # suggested
  # -  r-nycflights13  # suggested
  # -  r-purrr  # suggested
  # -  r-rmarkdown  # suggested
  # -  r-rsqlite  # suggested
  # -  r-stringi >=1.7.6  # suggested
  # -  r-testthat >=3.1.5  # suggested
  # -  r-tidyr >=1.3.0  # suggested
  # -  r-withr  # suggested

tests:
  - script:
      - Rscript -e 'library("dplyr")'

about:
  homepage: https://dplyr.tidyverse.org
  summary: A Grammar of Data Manipulation
  description: |-
    A fast, consistent tool for working with data frame like
    objects, both in memory and out of memory.
  license: MIT
  license_file:
    - ${{ PREFIX }}/lib/R/share/licenses/MIT
    - LICENSE
  repository: https://github.com/cran/dplyr
