<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>rattler-build Recipe Playground</title>
  <link rel="stylesheet" href="style.css">

  <!-- CodeMirror 6, loaded from a CDN as ES modules. Exact versions are
       pinned and shared dependencies (@codemirror/state, @lezer/*, ...) are
       marked `external` so every package resolves to the same singleton
       through this import map — otherwise CodeMirror throws on duplicate
       @codemirror/state instances. -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.7.0",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.43.4?external=@codemirror/state",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.12.4?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.4?external=@codemirror/state,@codemirror/view,@codemirror/language",
      "@codemirror/search": "https://esm.sh/@codemirror/search@6.7.1?external=@codemirror/state,@codemirror/view",
      "@codemirror/lang-yaml": "https://esm.sh/@codemirror/lang-yaml@6.1.3?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/yaml",
      "@lezer/common": "https://esm.sh/@lezer/common@1.5.2",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.3?external=@lezer/common",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.10?external=@lezer/common",
      "@lezer/yaml": "https://esm.sh/@lezer/yaml@1.0.4?external=@lezer/common,@lezer/highlight,@lezer/lr"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <h1>rattler-build playground</h1>
      <div class="toolbar-controls">
        <label for="platform-select">Platform:</label>
        <select id="platform-select"></select>

        <div class="tab-group">
          <button class="tab-btn active" data-mode="variants">Variants</button>
          <button class="tab-btn" data-mode="stage1">Evaluated</button>
          <button class="tab-btn" data-mode="stage0">Parsed</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="panel panel-left" id="panel-left">
        <div class="recipe-pane">
          <div class="panel-header">
            Recipe YAML
            <div class="generator-controls">
              <select id="generator-source" title="Recipe source">
                <option value="pypi">PyPI</option>
                <option value="cran">CRAN</option>
                <option value="cpan">CPAN</option>
              </select>
              <input id="generator-package" type="text" placeholder="package name" spellcheck="false" autocomplete="off">
              <input id="generator-version" type="text" placeholder="version (optional)" spellcheck="false" autocomplete="off">
              <button id="generator-btn" title="Fetch package metadata and generate a recipe">generate</button>
            </div>
          </div>
          <div class="editor-host" id="recipe-editor"></div>
        </div>
        <div class="divider-v" id="divider-v"></div>
        <div class="variables-panel">
          <div class="panel-header">
            Variant Config
            <button class="load-pinning-btn" id="load-pinning-btn" title="Insert conda-forge pinning into the editor">insert conda-forge pinning</button>
            <div class="variant-format-toggle" id="variant-format-toggle">
              <button class="variant-format-btn active" data-format="variants">variants.yaml</button>
              <button class="variant-format-btn" data-format="conda_build_config">conda_build_config</button>
            </div>
          </div>
          <div class="editor-host" id="variants-editor"></div>
          <div class="used-vars" id="used-vars"></div>
        </div>
      </div>

      <div class="divider-h" id="divider-h"></div>

      <div class="panel panel-right" id="panel-right">
        <div class="panel-header">
          Output
          <span class="badge" id="output-badge"></span>
        </div>
        <div class="output-container" id="output-container">
          <div class="output-placeholder">Loading WASM module...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
