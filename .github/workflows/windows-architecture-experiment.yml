name: Windows architecture experiment

# Temporary validation for x64 rattler-build on Windows ARM. Remove this
# workflow after it has run successfully on a Windows ARM runner.
on:
  pull_request:
    paths:
      - ".github/workflows/windows-architecture-experiment.yml"
      - "test-data/recipes/windows-architecture-execution/**"
      - "test-data/recipes/windows-architecture-execution-x86/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x64:
    name: Build x64 rattler-build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true
      - name: Build release binary
        run: pixi run build-release
      - name: Upload x64 binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rattler-build-x64
          path: target/release/rattler-build.exe
          if-no-files-found: error

  run-on-arm64:
    name: Run x64 build on Windows ARM
    needs: build-x64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download x64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rattler-build-x64
          path: bin
      - name: Verify switched child processes and forwarded failure status
        shell: pwsh
        run: |
          function Assert-CrossArchitecture {
            param(
              [string] $Recipe,
              [string] $Platform,
              [string] $ExpectedArchitecture,
              [string] $ExpectedWow64Architecture
            )

            $output = & "$env:GITHUB_WORKSPACE\bin\rattler-build.exe" build `
              --recipe $Recipe `
              --build-platform $Platform `
              --host-platform $Platform `
              --target-platform $Platform `
              --output-dir "output-$Platform" 2>&1
            $rattlerBuildExitCode = $LASTEXITCODE
            $outputText = $output | Out-String
            Write-Host $outputText

            if ($rattlerBuildExitCode -eq 0) {
              throw "Expected the recipe's intentional exit code 37 to fail the build."
            }
            if ($outputText -notmatch "PROCESSOR_ARCHITECTURE=$ExpectedArchitecture") {
              throw "Expected the activated environment to report $ExpectedArchitecture."
            }
            if ($outputText -notmatch "PROCESSOR_ARCHITEW6432=$ExpectedWow64Architecture") {
              throw "Expected the activated environment to report PROCESSOR_ARCHITEW6432=$ExpectedWow64Architecture."
            }
            if ($outputText -notmatch "ProcessArchitecture=$ExpectedArchitecture") {
              throw "Expected the launched PowerShell process to be $ExpectedArchitecture."
            }
            if ($outputText -notmatch "Script failed with status 37") {
              throw "Expected rattler-build to report the child exit code 37."
            }
          }

          Assert-CrossArchitecture `
            -Recipe test-data/recipes/windows-architecture-execution `
            -Platform win-arm64 `
            -ExpectedArchitecture ARM64 `
            -ExpectedWow64Architecture ""
          Assert-CrossArchitecture `
            -Recipe test-data/recipes/windows-architecture-execution-x86 `
            -Platform win-32 `
            -ExpectedArchitecture x86 `
            -ExpectedWow64Architecture ARM64
