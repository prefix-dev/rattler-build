name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/opt.rs"
      - "crates/rattler_build_docs/**"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "mkdocs.yml"
      - "pixi.*"
      - "src/opt.rs"
      - "crates/rattler_build_docs/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy"
        required: true
        default: "v0.0.0"

permissions: {}

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Generate CLI docs by building the `generate-cli-docs` binary and committing the result to the PR.
  generate-cli-docs:
    if: github.event_name == 'pull_request' && github.repository == 'prefix-dev/rattler-build'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Remove stale autogenerated CLI docs
        run: |
          grep --include='*.md' -rl 'This file is autogenerated. Do not edit manually!' docs/reference/cli/ | xargs --no-run-if-empty rm

      - name: Regenerate CLI docs
        run: |
          pixi run generate-cli-docs

      - name: Check for changes
        id: git_diff
        run: |
          git add docs/reference/cli/
          git diff --staged --exit-code || echo "has_changes=true" >> $GITHUB_ENV

      - name: Output instructions if there are changes
        if: env.has_changes == 'true'
        run: |
          echo "There are changes in the CLI docs."
          echo "Please run the following commands to commit and push the changes:"
          echo ""
          echo "pixi run generate-cli-docs"
          echo "git commit -am 'docs: update CLI docs'"
          echo "git push"
          echo ""
          exit 1

      - name: Output message if there are no changes
        if: env.has_changes != 'true'
        run: echo "No changes detected."

  build-docs:
    needs: generate-cli-docs
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Build docs for test
        run: |
          pixi run build-docs

  docs-release:
    # Don't run on forks
    if: github.repository == 'prefix-dev/rattler-build' && github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch everything so we can checkout the tag
          fetch-depth: 0
          submodules: recursive

      - name: Checkout tag
        run: git checkout tags/${GITHUB_EVENT_INPUTS_TAG}
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_EVENT_INPUTS_TAG}" >> $GITHUB_ENV
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - name: Deploy with mike 🚀
        run: |
          pixi run deploy-latest

  docs-dev:
    # Don't run on forks
    if: >-
      github.repository == 'prefix-dev/rattler-build' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && !startsWith(github.event.inputs.tag, 'v'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch everything so we can checkout the tag
          fetch-depth: 0
          submodules: recursive

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Deploy with mike 🚀
        run: |
          pixi run deploy-dev
