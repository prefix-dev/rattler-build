name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the full build pipeline without publishing or tagging"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # PHASE 1: Build everything (no publishing)
  # ============================================================

  # Read version from Cargo.toml and make it available to all jobs
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: release
      - name: Extract version
        id: version
        run: pixi run -e release extract-version >> "$GITHUB_OUTPUT"

  # Cross-platform release builds
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    environment: ${{ contains(matrix.target, 'pc-windows') && 'release' || '' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            use-cross: true
          - target: powerpc64le-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-2022
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    env:
      # Enable Link Time Optimization (LTO) for release builds.
      CARGO_PROFILE_RELEASE_LTO: true
      # Use a single code gen unit to reduce binary size.
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
      # Strip symbols from release binaries.
      CARGO_PROFILE_RELEASE_STRIP: symbols
      # Optimize for size.
      CARGO_PROFILE_RELEASE_OPT_LEVEL: s
      # Enable performance, s3, and sigstore features for release builds.
      REQUIRED_FEATURES: recipe-generation,performance,s3,sigstore

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Configure pixi for win-arm64
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          mkdir -p ~/.pixi
          echo 'tool-platform = "win-64"' > ~/.pixi/config.toml

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: release

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: "1.93.1"
          target: ${{ matrix.target }}
          cache: false

      - name: Install musl-gcc
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt install musl-tools

      - name: Install gnu-openssl
        if: matrix.target == 'powerpc64le-unknown-linux-gnu'
        run: sudo apt install libssl-dev

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15 # v2.75.7
        with:
          tool: cross

      - name: Set build options
        id: options
        run: pixi run -e release build-options --target ${{ matrix.target }}

      - name: Build
        run: >-
          ${{ matrix.use-cross && 'cross' || 'cargo' }}
          build
          --locked
          --release
          --features ${{ env.REQUIRED_FEATURES }}
          --target=${{ matrix.target }}
          ${{ steps.options.outputs.cargo-build-options }}

      - name: Codesign and notarize macOS binary
        if: contains(matrix.target, 'apple-darwin')
        env:
          CODESIGN_CERTIFICATE: ${{ secrets.CODESIGN_CERTIFICATE }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
          CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
          APPLEID_USERNAME: ${{ secrets.APPLEID_USERNAME }}
          APPLEID_PASSWORD: ${{ secrets.APPLEID_PASSWORD }}
          APPLEID_TEAMID: ${{ vars.APPLEID_TEAMID }}
        run: >-
          pixi run -e release sign-macos
          --binary target/${{ matrix.target }}/release/rattler-build

      - name: Azure login (OIDC)
        if: contains(matrix.target, 'pc-windows')
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Stage Windows binary for signing
        if: contains(matrix.target, 'pc-windows')
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/to-sign"
          cp "target/${{ matrix.target }}/release/rattler-build.exe" "${RUNNER_TEMP}/to-sign/"

      - name: Sign with Azure Trusted Signing
        if: contains(matrix.target, 'pc-windows')
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ runner.temp }}/to-sign
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Copy signed Windows binary back
        if: contains(matrix.target, 'pc-windows')
        shell: bash
        run: |
          cp "${RUNNER_TEMP}/to-sign/rattler-build.exe" "target/${{ matrix.target }}/release/rattler-build.exe"

      - name: Package binary
        id: package
        run: pixi run -e release package-binary --target ${{ matrix.target }}

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-rattler-build-${{ matrix.target }}
          path: staging/

  # Build Python wheels (reusable workflow)
  build-python-wheels:
    name: Build Python wheels
    needs: prepare
    uses: ./.github/workflows/python-build.yml
    with:
      sha: ${{ github.sha }}

  # ============================================================
  # PHASE 2: Publish (only after ALL Phase 1 jobs succeed)
  # ============================================================

  # Create git tag only after all builds pass
  tag-release:
    name: Tag release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      !inputs.dry-run &&
      github.ref == 'refs/heads/main'
    needs: [prepare, build-binaries, build-python-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: release
      - name: Create and push tag
        run: pixi run -e release create-tag --tag ${NEEDS_PREPARE_OUTPUTS_TAG}
        env:
          NEEDS_PREPARE_OUTPUTS_TAG: ${{ needs.prepare.outputs.tag }}

      # Tag pushes made via GITHUB_TOKEN do not trigger downstream workflows,
      # so dispatch the docs deploy explicitly.
      - name: Trigger docs deploy
        run: gh workflow run docs.yml --ref main --field tag=${NEEDS_PREPARE_OUTPUTS_TAG}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_PREPARE_OUTPUTS_TAG: ${{ needs.prepare.outputs.tag }}

  # Create GitHub release with all signed artifacts
  create-release:
    name: Create GitHub Release
    needs: [prepare, tag-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: release
      - name: Download all release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets/
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_PREPARE_OUTPUTS_TAG: ${{ needs.prepare.outputs.tag }}
        run: pixi run -e release create-release --tag ${NEEDS_PREPARE_OUTPUTS_TAG} --assets-dir release-assets/

  # Publish Python wheels to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: tag-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
          packages-dir: dist/
