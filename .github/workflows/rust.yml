on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/rust.yml"
      - "src/**"
      - "crates/**"
      - "Cargo.*"
      - "pixi.lock"
      - "test/end-to-end/**"
      - "test-data/**"
  workflow_dispatch:

name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  ACTIONS_CACHE_SERVICE_V2: on

jobs:
  # Run Rust unit/integration tests (debug mode)
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Configure sccache
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      # https://github.com/actions/runner-images/issues/5459#issuecomment-1532856844
      - name: Set up GNU patch on Windows
        # Needed to use GNU patch instead of Strawberry Perl patch
        if: ${{ contains(github.event.pull_request.labels.*.name, 'need-patch-apply-tests') && matrix.os == 'windows-latest' }}
        run: Add-Content $env:GITHUB_PATH "C:\Program Files\Git\usr\bin"
      - name: Set up GNU patch on MacOS
        # Needed to use GNU patch instead of whatever is builtin on macos (1 test fails)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'need-patch-apply-tests') && matrix.os == 'macos-latest' }}
        run: pixi global install patch=2.7.6
      - name: Set up patchelf on MacOS
        if: ${{ matrix.os == 'macos-latest' }}
        run: pixi global install patchelf
      - name: Run tests
        run: pixi run cargo test --workspace --all-targets --features=recipe-generation --verbose -- --nocapture
      - name: Run patch apply tests
        # https://github.com/orgs/community/discussions/26261#discussioncomment-3251039
        if: ${{ contains(github.event.pull_request.labels.*.name, 'need-patch-apply-tests') }}
        run: |
          patch --version
          pixi run cargo test --features=recipe-generation,patch-test-extra -- --nocapture --ignored
      - name: Show sccache stats
        if: always()
        run: pixi run sccache --show-stats

  # Run end-to-end tests
  e2e-test:
    name: End-to-end (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RATTLER_BUILD_ENABLE_GITHUB_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Configure sccache
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Build release binary
        run: pixi run build-release
      - name: Run end-to-end tests
        run: pixi run test-end-to-end-ci
        env:
          PREFIX_DEV_READ_ONLY_TOKEN: ${{ secrets.PREFIX_DEV_READ_ONLY_TOKEN }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_UPLOAD_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_UPLOAD_ACCESS_KEY_SECRET }}
      - name: Stage x64 release binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binary = Get-ChildItem target-pixi -Recurse -Filter rattler-build.exe |
            Where-Object { $_.DirectoryName -match "\\release$" } |
            Select-Object -First 1
          if ($null -eq $binary) {
            throw "Could not find the x64 release binary."
          }
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item $binary.FullName staging/rattler-build.exe
      - name: Upload x64 release binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.0
        with:
          name: rattler-build-windows-x64-e2e
          path: staging/rattler-build.exe
          if-no-files-found: error
      - name: Show sccache stats
        if: always()
        run: pixi run sccache --show-stats

  windows-arm-e2e-test:
    name: End-to-end (windows-11-arm)
    needs: e2e-test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Download x64 release binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rattler-build-windows-x64-e2e
          path: bin
      - name: Run Windows architecture E2E test
        run: pixi run --platform win-64 --frozen pytest test/end-to-end/test_windows_architecture_execution.py -v
        env:
          RATTLER_BUILD_PATH: ${{ github.workspace }}\bin\rattler-build.exe

  rebuild-test:
    name: Rebuild Test
    if: contains(github.event.pull_request.labels.*.name, 'needs-rebuild-tests')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Configure sccache
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Build release binary
        run: pixi run build-release
      - name: Build rich package
        run: |
          mkdir -p output
          ./target-pixi/$CARGO_BUILD_TARGET/release/rattler-build build --recipe ./examples/rich
          echo "Built packages:"
          ls -la ./output/noarch/
      - name: Rebuild rich package
        run: |
          PACKAGE=$(find ./output/noarch/rich-*.conda | head -n1)
          echo "Rebuilding package: $PACKAGE"
          ./target-pixi/$CARGO_BUILD_TARGET/release/rattler-build rebuild --package-file "$PACKAGE"
          echo "Rebuild completed successfully"
      - name: Compare original and rebuilt packages
        run: |
          echo "Contents after rebuild:"
          ls -la ./output/noarch/
      - name: Show sccache stats
        if: always()
        run: pixi run sccache --show-stats
