name: Deploy Playground

on:
  push:
    branches:
      - main
      - wasm-support
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0

      - name: Build WASM playground
        run: pixi run --environment playground playground-build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playground
          path: deploy/

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/wasm-support')
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=rattler-build-playground
