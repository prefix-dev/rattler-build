name: Deploy Playground

on:
  push:
    branches:
      - main
      - wasm-support
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Build WASM playground
        run: pixi run --environment playground playground-build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playground
          path: deploy/

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/wasm-support')
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=rattler-build-playground
