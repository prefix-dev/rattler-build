name: Deploy Playground

on:
  push:
    branches:
      - main
      - wasm-support
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/rattler_build_playground/**"
      - "crates/rattler_build_jinja/**"
      - "crates/rattler_build_recipe/**"
      - "crates/rattler_build_variant_config/**"
      - "crates/rattler_build_types/**"
      - "crates/rattler_build_yaml_parser/**"
      - ".github/workflows/playground.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Build WASM playground
        run: pixi run --environment playground playground-build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playground
          path: deploy/

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/wasm-support')
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=rattler-build-playground
