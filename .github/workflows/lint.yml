name: lint

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: "true"
  ACTIONS_CACHE_SERVICE_V2: on

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: pre-commit lint
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Configure sccache
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: lint (if this step fails, please 'pixi run -e pre-commit lint' locally and push the changes)
        run: pixi run -e pre-commit lint
      - name: Show sccache stats
        if: always()
        run: pixi run sccache --show-stats
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Formatting changes detected! Run 'pixi run -e pre-commit lint' locally and commit the changes."
            exit 1
          fi
