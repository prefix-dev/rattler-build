[files]
extend-exclude = [
  ".git/",
  ".pixi/",
  "**/*.snap",
  "**/*.patch",
  "tests/data/mapping_files/*",
  "test-data/conda_forge/**/*",
  "test-data/patch_application/**/*",
  "**/*.ipynb",
  "**/__marimo__/",
]
ignore-hidden = false

[default]
# `pyton` is an intentional misspelling in a unit test that checks the
# interpreter "did you mean" suggestion. Scope the ignore to that exact usage.
extend-ignore-re = ['closest_interpreter\("pyton"\)']

[default.extend-identifiers]
ratatui = "ratatui"
ND = "ND"
FreeTakServer = "FreeTakServer"
BA = "BA"

[default.extend-words]
placehold = "placehold"
intoto = "intoto"
